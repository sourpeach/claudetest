<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 230px;
      padding: 14px 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      color: #111827;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .dot {
      width: 10px;
      height: 10px;
      background: #0CAA41;
      border-radius: 50%;
      flex-shrink: 0;
    }
    h2 { font-size: 14px; font-weight: 700; margin: 0; }
    p  { color: #6b7280; line-height: 1.5; margin: 0 0 8px; font-size: 12px; }
    .tip {
      background: #f0fdf4;
      border-left: 3px solid #0CAA41;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: 11px;
      color: #374151;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot"></div>
    <h2>Glassdoor Preview</h2>
  </div>
  <p>Navigate to a <strong>LinkedIn job listing</strong> and the Glassdoor panel will appear automatically in the bottom-right corner.</p>
  <div class="tip">Ratings are pulled from Glassdoor's search data and may not always be available for smaller companies.</div>
</body>
</html>
